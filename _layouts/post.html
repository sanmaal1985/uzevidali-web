---
layout: default
---
<article class="post">
  <a class="post__back" href="{{ '/' | relative_url }}">← все посты</a>

  <div class="post__date">{{ page.date | date: "%d %b %Y" }}</div>
  <h1 class="post__title">{{ page.title }}</h1>

  <hr class="post__divider">

  <div class="post-content" id="post-content">
    {{ content }}
  </div>
</article>

<script>
(function () {
  var c = document.getElementById('post-content');
  if (!c) return;
  c.querySelectorAll('p').forEach(function (p) {
    if (p.textContent.trim() === 'Уже видали.') {
      p.classList.add('pivot');
    }
  });
}());
</script>
